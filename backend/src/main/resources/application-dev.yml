spring:
  datasource:
    url: jdbc:h2:mem:portfolio;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-dev.sql
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console

app:
  jwt:
    secret: dev-secret-key-only-for-local-not-secure-at-all-32chars
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
